name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Nettoyage des droits root
        run: sudo rm -rf src/__pycache__    
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Creer fichier .env
        run: |
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_NAME=labo02_db" >> .env
          echo "DB_USER=labo02" >> .env
          echo "DB_PASS=labo02" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_DB=0" >> .env

      - name: Run tests
        working-directory: src
        run: |
          echo "Préparation de l'environnement..."
          cd ..
          
          # Force la création du réseau. Le "|| true" empêche le script de planter si le réseau existe déjà.
          docker network create labo04-network || true
          
          echo "Déploiement de l'infrastructure Docker..."
          docker compose down
          docker compose build
          docker compose up -d
          
          echo "Attente de 15 secondes pour que MySQL soit prêt..."
          sleep 15
          
          echo "Lancement des tests..."
          cd src
          pytest -v